<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Share Pro</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f172a;
      color: white;
      padding: 20px;
      margin: 0;
    }
    .controls {
      background: #1e293b;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      max-width: 400px;
      margin: 0 auto;
    }
    input {
      padding: 12px;
      margin: 10px 0;
      width: 100%;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
    }
    button {
      padding: 12px;
      margin: 5px 0;
      width: 100%;
      cursor: pointer;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { background-color: #2563eb; }
    button:disabled { background-color: #475569; cursor: not-allowed; }
    #status { font-size: 0.9rem; color: #94a3b8; margin-top: 15px; }

    /* Draggable Window */
    #videoContainer {
      position: fixed;
      top: 50px;
      left: 50px;
      width: 480px;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.8);
      cursor: grab;
      display: none;
      z-index: 9999;
      border: 2px solid #3b82f6;
    }
    #videoContainer:active { cursor: grabbing; }
    #dragHandle {
      background: #3b82f6;
      color: white;
      padding: 5px;
      text-align: center;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    video { width: 100%; display: block; background: black; }
  </style>
</head>
<body>

  <div class="controls">
    <h2 style="margin-top:0">Screen Share</h2>
    <input type="text" id="roomId" placeholder="Create or Enter Room ID">
    <button id="hostBtn">Start Sharing</button>
    <button id="joinBtn">Join Room</button>
    <button id="pipBtn" disabled>Pop Out (PiP)</button>
    <p id="status">Status: Ready</p>
  </div>

  <div id="videoContainer">
    <div id="dragHandle">Click & Drag to Move</div>
    <video id="sharedScreen" autoplay playsinline muted></video>
  </div>

  <script>
    const roomIdInput = document.getElementById('roomId');
    const hostBtn = document.getElementById('hostBtn');
    const joinBtn = document.getElementById('joinBtn');
    const pipBtn = document.getElementById('pipBtn');
    const statusText = document.getElementById('status');
    const video = document.getElementById('sharedScreen');
    const videoContainer = document.getElementById('videoContainer');

    let peer;
    let localStream;

    // Google STUN servers help bypass NAT/Firewalls
    const peerConfig = {
      config: {
        'iceServers': [
          { 'urls': 'stun:stun.l.google.com:19302' },
          { 'urls': 'stun:stun1.l.google.com:19302' }
        ]
      }
    };

    function handleStream(stream) {
      video.srcObject = stream;
      videoContainer.style.display = 'block';
      pipBtn.disabled = false;
      
      // Force play to prevent black screen
      video.play().catch(e => console.error("Playback failed", e));
    }

    // --- HOST LOGIC ---
    hostBtn.addEventListener('click', async () => {
      const id = roomIdInput.value.trim();
      if (!id) return alert('Enter a Room ID');

      try {
        localStream = await navigator.mediaDevices.getDisplayMedia({ 
          video: true, 
          audio: true 
        });
        
        handleStream(localStream);
        peer = new Peer(id, peerConfig);

        peer.on('open', () => {
          statusText.innerText = `Status: Hosting room "${id}"`;
        });

        peer.on('connection', (conn) => {
          statusText.innerText = "Status: Friend connected. Sending data...";
          setTimeout(() => {
            peer.call(conn.peer, localStream);
          }, 1000);
        });

        peer.on('error', (err) => {
          statusText.innerText = `Error: ${err.type}`;
          console.error(err);
        });

      } catch (err) {
        statusText.innerText = "Status: Permission denied or cancelled.";
      }
    });

    // --- JOIN LOGIC ---
    joinBtn.addEventListener('click', () => {
      const id = roomIdInput.value.trim();
      if (!id) return alert('Enter a Room ID');

      peer = new Peer(peerConfig);
      
      peer.on('open', () => {
        statusText.innerText = `Status: Connecting to ${id}...`;
        peer.connect(id);
      });

      peer.on('call', (call) => {
        call.answer();
        call.on('stream', (remoteStream) => {
          statusText.innerText = "Status: Stream Active!";
          handleStream(remoteStream);
        });
      });

      peer.on('error', (err) => {
        statusText.innerText = `Error: ${err.type}`;
        console.error(err);
      });
    });

    // --- PiP LOGIC ---
    pipBtn.addEventListener('click', async () => {
      if (document.pictureInPictureElement) {
        await document.exitPictureInPicture();
      } else {
        await video.requestPictureInPicture();
      }
    });

    // --- DRAG LOGIC ---
    let isDragging = false;
    let offset = [0,0];
    videoContainer.addEventListener('mousedown', (e) => {
      isDragging = true;
      offset = [
        videoContainer.offsetLeft - e.clientX,
        videoContainer.offsetTop - e.clientY
      ];
    }, true);

    document.addEventListener('mouseup', () => { isDragging = false; }, true);

    document.addEventListener('mousemove', (event) => {
      event.preventDefault();
      if (isDragging) {
        videoContainer.style.left = (event.clientX + offset[0]) + 'px';
        videoContainer.style.top  = (event.clientY + offset[1]) + 'px';
      }
    }, true);
  </script>
</body>
</html>
